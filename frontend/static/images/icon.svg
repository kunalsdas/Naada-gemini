    <path d="M240 256 Q240 130 240 80" />
    <path d="M280 256 Q280 130 280 80" />
    <path d="M320 256 Q320 160 320 100" />
    <path d="M360 256 Q360 180 360 140" />
  </g>
  <g fill="none" stroke="url(#wave)" stroke-width="16" stroke-linecap="round" opacity="0.6">
    <path d="M160 256 Q160 332 160 372" />
    <path d="M200 256 Q200 352 200 412" />
    <path d="M240 256 Q240 382 240 432" />
    <path d="M280 256 Q280 382 280 432" />
    <path d="M320 256 Q320 352 320 412" />
    <path d="M360 256 Q360 332 360 372" />
  </g>
  <!-- N letter -->
  <text x="256" y="280" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700" font-size="180" fill="white" opacity="0.95">N</text>
</svg>
